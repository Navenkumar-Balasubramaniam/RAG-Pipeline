# ============================================================
# Pytest configuration
# ============================================================
# This file tells pytest how to discover and run tests.
# Run the full test suite with:    pytest
# Run a single test file with:     pytest tests/test_pdf_loader.py
# Run with verbose output:         pytest -v
# Run and show prints:             pytest -s
# Run with coverage report:        pytest --cov=src
# ============================================================

[pytest]
# Directories pytest should look in for tests
testpaths = tests

# Files matching this pattern are test files
python_files = test_*.py

# Functions matching this pattern are individual tests
python_functions = test_*

# Default command-line options applied to every pytest run:
#   -v       verbose (show every test name)
#   --tb=short    on failure, show a short traceback (not 30 lines)
#   --strict-markers   error if a test uses an unknown @pytest.mark
addopts = -v --tb=short --strict-markers

# Custom markers for organising tests
# Use as:  @pytest.mark.slow  on a test, then run only fast tests with:
#         pytest -m "not slow"
markers =
    slow: tests that take more than ~2 seconds (OCR, model loading)
    integration: tests that hit external services (Ollama, the filesystem)